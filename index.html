<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Medidor de Amor</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
  }

  input[type="range"] {
    width: 300px;
  }

  #msg {
    font-size: 24px;
    margin-top: 20px;
  }
</style>
</head>

<body>
<h1>Quanto você ama a Anna?</h1>

<input type="range" id="amor" min="0" max="100000" oninput="mostrar()">
<p id="valor">0</p>
<p id="msg"></p>

<script>
function mostrar() {
    let valor = document.querySelector("#amor").value;
    let numero = Number(valor);
    document.querySelector("#valor").innerText = numero;
    let msg = document.querySelector("#msg");
    let vezes = ""

    for (let i = 1; i <= numero + 1; i++){
        vezes += "Bruno ama Anna " + i + "x" + "<br>"
    } 

    msg.innerHTML = "O Bruno ama " + (numero + 1) + " vezes mais" + "<br>" + vezes

    
}
</script>

</body>
</html>
